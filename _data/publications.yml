sections:
  - title: "Under Review and Preprints"
    items:
      - title: "Enhancing Transient Performance in Stochastic Gradient Methods: A Strategic Querying Approach"
        authors: "N. Jiang, H.-T. Wai, and M. Alizadeh"
        venue: "IEEE Transactions on Control of Network Systems, under review"
        summary: "Studies strategic querying for stochastic gradient methods with an emphasis on transient performance."
      - title: "Pricing Electric Vehicle Charging and Station Access via Copositive Duality"
        authors: "N. Jiang, Y. Zhou, J. A. Taylor, and M. Alizadeh"
        venue: "European Journal of Operational Research, under review; arXiv:2604.15227"
        url: "https://arxiv.org/abs/2604.15227"
        summary: "Uses convex and copositive duality to analyze pricing for EV charging with discrete access decisions."
      - title: "Near-Optimal Regret for the Safe Learning-based Control of the Constrained Linear Quadratic Regulator"
        authors: "S. Hutchinson, N. Jiang, and M. Alizadeh"
        venue: "arXiv:2604.22158, submitted"
        url: "https://arxiv.org/abs/2604.22158"
        summary: "Studies safe adaptive LQR with unknown dynamics, near-optimal regret, and chance constraints."
  - title: "Conference Papers"
    items:
      - title: "Stochastic Gradient Descent with Strategic Querying"
        authors: "N. Jiang, H.-T. Wai, and M. Alizadeh"
        venue: "IEEE Conference on Decision and Control (CDC), 2025"
        url: "https://arxiv.org/abs/2508.17144"
        summary: "Introduces strategic querying for stochastic gradient methods under a limited query budget."
      - title: "Online Nonstochastic Control with Convex Safety Constraints"
        authors: "N. Jiang, S. Hutchinson, and M. Alizadeh"
        venue: "American Control Conference (ACC), 2025"
        url: "https://arxiv.org/abs/2501.18039"
        summary: "Studies online nonstochastic control with convex trajectory-level safety constraints."
